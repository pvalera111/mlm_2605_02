name: RHEL Expert Engine CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Static Textual Verification over all Engine Architectures without loading frameworks
     King-Size Code Grid Validation Layout Pass
    - name: Validate Python Syntax trees and JSON Mapping
      run: |
        echo "⚙️ Running static analysis over Multi-Engine layers..."
        
        # 1. Validate Shared Database Profiles
        python -m json.tool data/routing_rules.json
        python -c "import ast; ast.parse(open('data/base_knowledge.py', encoding='utf-8').read()); print('✅ Shared Knowledge Matrix syntax verified.')"
        
        # 2. Validate Engine 1 (PyTorch Modern Stack)
        python -c "import ast; ast.parse(open('engine_pytorch_modern/run_vector.py', encoding='utf-8').read()); print('✅ PyTorch Training Core syntax verified.')"
        python -c "import ast; ast.parse(open('engine_pytorch_modern/ask_expert.py', encoding='utf-8').read()); print('✅ PyTorch Runtime Engine syntax verified.')"
        
        # 3. Validate Engine 2 (TensorFlow Legacy Stack)
        python -c "import ast; ast.parse(open('engine_tensorflow_legacy/run_vector.py', encoding='utf-8').read()); print('✅ TensorFlow Training Core syntax verified.')"
        python -c "import ast; ast.parse(open('engine_tensorflow_legacy/ask_expert.py', encoding='utf-8').read()); print('✅ TensorFlow Runtime Engine syntax verified.')"
